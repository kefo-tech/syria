<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الخدمات | KeFo.tech</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="بوابة خدمات ذكية تعرض الطقس والمنطقة الحالية مع خدمات إضافية قابلة للتوسعة." />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <style>
    :root{
      --bg1:#081120;
      --bg2:#0f172a;
      --card:rgba(255,255,255,0.07);
      --card-border:rgba(255,255,255,0.12);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#38bdf8;
      --accent2:#22c55e;
      --shadow:0 10px 35px rgba(0,0,0,.28);
      --radius:22px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
    }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
    }

    body{
      font-family:"Tahoma","Arial",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(56,189,248,0.16), transparent 28%),
        radial-gradient(circle at top left, rgba(34,197,94,0.10), transparent 24%),
        linear-gradient(160deg,var(--bg1),var(--bg2));
      user-select:none;
      -webkit-user-select:none;
      -moz-user-select:none;
      -ms-user-select:none;
      overflow-x:hidden;
    }

    .container{
      width:min(1100px, 94%);
      margin:auto;
      padding:16px 0 28px;
    }

    .header-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .top-action-btn{
      border:none;
      outline:none;
      cursor:pointer;
      color:#fff;
      font-family:inherit;
      font-size:.88rem;
      font-weight:800;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.12);
      border-radius:999px;
      padding:11px 15px;
      box-shadow:var(--shadow);
      transition:.2s ease;
    }

    .top-action-btn:hover{
      transform:translateY(-2px);
      border-color:rgba(56,189,248,.35);
    }

    .top-cards{
      display:grid;
      grid-template-columns:minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap:12px;
      margin-bottom:20px;
      align-items:stretch;
    }

    .glass-card{
      background:var(--card);
      border:1px solid var(--card-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      position:relative;
      overflow:hidden;
      min-height:126px;
    }

    .glass-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.08), transparent 45%);
      pointer-events:none;
    }

    .card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      position:relative;
      z-index:1;
      margin-bottom:12px;
    }

    .card-title{
      margin:0;
      font-size:clamp(.9rem, 1.5vw, 1.02rem);
      font-weight:800;
      color:#fff;
      line-height:1.3;
    }

    .badge{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      color:#e2e8f0;
      padding:7px 10px;
      border-radius:999px;
      font-size:clamp(.68rem, 1.2vw, .84rem);
      white-space:nowrap;
      flex-shrink:0;
    }

    .weather-card-content{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:12px;
      min-height:68px;
    }

    .weather-icon{
      width:clamp(46px, 8vw, 60px);
      height:clamp(46px, 8vw, 60px);
      border-radius:18px;
      display:grid;
      place-items:center;
      font-size:clamp(1.2rem, 2.5vw, 1.8rem);
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.10);
      flex-shrink:0;
    }

    .weather-temp{
      font-size:clamp(1.4rem, 4vw, 2.1rem);
      font-weight:900;
      line-height:1;
      margin-bottom:5px;
      letter-spacing:-0.5px;
    }

    .weather-desc{
      color:var(--muted);
      font-size:clamp(.78rem, 1.8vw, .96rem);
      line-height:1.45;
      margin-bottom:6px;
    }

    .next-weather{
      display:inline-flex;
      align-items:center;
      gap:7px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      padding:7px 10px;
      border-radius:999px;
      color:#e2e8f0;
      font-size:clamp(.68rem, 1.5vw, .82rem);
      line-height:1.4;
      flex-wrap:wrap;
    }

    .next-weather-icon{
      font-size:1rem;
      line-height:1;
    }

    .location-card-content{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:68px;
    }

    .welcome-text{
      color:var(--muted);
      font-size:clamp(.78rem, 1.8vw, .96rem);
      margin-bottom:8px;
      line-height:1.4;
    }

    .area-name{
      margin:0;
      font-size:clamp(1rem, 3.2vw, 1.8rem);
      font-weight:900;
      line-height:1.35;
      color:#fff;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .services-title{
      margin:0 0 14px;
      font-size:clamp(.96rem, 1.8vw, 1.06rem);
      font-weight:800;
      color:#fff;
    }

    .services-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
    }

    .service-btn{
      text-decoration:none;
      color:#fff;
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;
      min-height:118px;
      padding:15px 10px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:9px;
      transition:.22s ease;
      box-shadow:var(--shadow);
    }

    .service-btn:hover{
      transform:translateY(-4px);
      border-color:rgba(56,189,248,.4);
      background:linear-gradient(180deg, rgba(56,189,248,.14), rgba(255,255,255,.06));
    }

    .service-icon{
      width:clamp(42px, 7vw, 54px);
      height:clamp(42px, 7vw, 54px);
      border-radius:16px;
      display:grid;
      place-items:center;
      font-size:clamp(1.15rem, 2.4vw, 1.55rem);
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.10);
      flex-shrink:0;
    }

    .service-title{
      font-size:clamp(.82rem, 1.8vw, 1rem);
      font-weight:800;
      line-height:1.35;
    }

    .service-sub{
      font-size:clamp(.68rem, 1.45vw, .82rem);
      color:var(--muted);
      line-height:1.45;
    }

    .copyright{
      margin-top:24px;
      text-align:center;
      color:#cbd5e1;
      font-size:clamp(.75rem, 1.6vw, .9rem);
      opacity:.92;
      padding:14px 10px;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .loading-text,
    .error-text{
      color:#fff;
      font-size:clamp(.78rem, 1.7vw, .96rem);
      line-height:1.7;
      position:relative;
      z-index:1;
    }

    .osm-note{
      margin-top:10px;
      color:#94a3b8;
      font-size:clamp(.66rem, 1.3vw, .78rem);
      text-align:center;
      line-height:1.5;
    }

    @media (max-width: 700px){
      .container{
        width:min(97%, 97%);
        padding:12px 0 22px;
      }

      .top-cards{
        grid-template-columns:minmax(0, 1fr) minmax(0, 1fr);
        gap:10px;
      }

      .glass-card{
        min-height:112px;
        padding:12px;
        border-radius:18px;
      }

      .card-head{
        margin-bottom:10px;
        gap:6px;
      }

      .badge{
        padding:6px 8px;
      }

      .weather-card-content{
        gap:9px;
        min-height:auto;
      }

      .services-grid{
        gap:10px;
      }

      .service-btn{
        min-height:98px;
        padding:12px 7px;
        border-radius:17px;
        gap:7px;
      }

      .service-sub{
        display:none;
      }

      .next-weather{
        padding:6px 8px;
      }

      .header-actions{
        justify-content:center;
      }
    }

    @media (max-width: 420px){
      .container{
        width:min(98%, 98%);
      }

      .top-cards{
        gap:8px;
      }

      .glass-card{
        padding:10px;
        min-height:104px;
        border-radius:16px;
      }

      .card-title{
        font-size:.82rem;
      }

      .badge{
        font-size:.62rem;
        padding:5px 7px;
      }

      .weather-temp{
        font-size:1.18rem;
      }

      .weather-desc{
        font-size:.72rem;
      }

      .welcome-text{
        font-size:.72rem;
      }

      .area-name{
        font-size:.95rem;
        line-height:1.3;
      }

      .services-grid{
        gap:8px;
      }

      .service-btn{
        min-height:90px;
        padding:10px 6px;
        border-radius:15px;
      }

      .service-title{
        font-size:.75rem;
      }

      .service-icon{
        border-radius:13px;
      }

      .next-weather{
        font-size:.64rem;
      }
    }
  </style>
</head>

        thunderHailLight: "हल्की ओलों के साथ तूफ़ान",

    const T = I18N[APP_LANG];

    const weatherContent = document.getElementById("weatherContent");
    const weatherBadge = document.getElementById("weatherBadge");
    const areaName = document.getElementById("areaName");
    const locationBadge = document.getElementById("locationBadge");
    const shareBtn = document.getElementById("shareBtn");
    const installBtn = document.getElementById("installBtn");

    let deferredPrompt = null;

    init();

    function init() {
      applyTranslations();
      registerServiceWorker();
      setupInstallPrompt();
      setupShare();
      setupProtection();

      if (!navigator.geolocation) {
        showLocationError(T.geolocationNotSupported);
        showWeatherError(T.geolocationNotSupported);
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          await Promise.all([
            loadWeather(lat, lon),
            loadAreaName(lat, lon)
          ]);
        },
        () => {
          showLocationError(T.geolocationDenied);
          showWeatherError(T.geolocationDenied);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    function applyTranslations() {
      document.documentElement.lang = APP_LANG;
      document.documentElement.dir = APP_LANG === "ar" ? "rtl" : "ltr";
      document.title = T.title;

      installBtn.textContent = T.install;
      shareBtn.textContent = T.share;

      document.getElementById("weatherCardTitle").textContent = T.weatherCardTitle;
      document.getElementById("locationCardTitle").textContent = T.locationCardTitle;
      document.getElementById("welcomeText").textContent = T.welcome;
      document.getElementById("servicesTitle").textContent = T.servicesTitle;
      document.getElementById("service1Title").textContent = T.service1Title;
      document.getElementById("service1Sub").textContent = T.service1Sub;
      document.getElementById("service2Title").textContent = T.service2Title;
      document.getElementById("service2Sub").textContent = T.service2Sub;
      document.getElementById("service3Title").textContent = T.service3Title;
      document.getElementById("service3Sub").textContent = T.service3Sub;
      document.getElementById("service4Title").textContent = T.service4Title;
      document.getElementById("service4Sub").textContent = T.service4Sub;
      document.getElementById("service5Title").textContent = T.service5Title;
      document.getElementById("service5Sub").textContent = T.service5Sub;
      document.getElementById("service6Title").textContent = T.service6Title;
      document.getElementById("service6Sub").textContent = T.service6Sub;
      document.getElementById("osmNote").textContent = T.osmNote;
      document.getElementById("copyrightText").textContent = T.copyright;

      weatherBadge.textContent = T.weatherUpdating;
      locationBadge.textContent = T.locationLocating;
      weatherContent.textContent = T.weatherLoading;
      areaName.textContent = T.areaLoading;
    }

    function registerServiceWorker() {
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    }

    function setupInstallPrompt() {
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
      });

      installBtn.addEventListener("click", async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
        } else {
          alert(T.installHint);
        }
      });
    }

    function setupShare() {
      shareBtn.addEventListener("click", async () => {
        const shareData = {
          title: T.title,
          text: T.shareText,
          url: window.location.href
        };

        try {
          if (navigator.share) {
            await navigator.share(shareData);
          } else {
            await navigator.clipboard.writeText(window.location.href);
            alert(T.copied);
          }
        } catch (e) {}
      });
    }

    function setupProtection() {
      document.addEventListener("contextmenu", (e) => e.preventDefault());
      document.addEventListener("dragstart", (e) => e.preventDefault());
      document.addEventListener("selectstart", (e) => e.preventDefault());
      document.addEventListener("copy", (e) => e.preventDefault());
      document.addEventListener("cut", (e) => e.preventDefault());

      document.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();

        if (e.key === "F12") {
          e.preventDefault();
          return false;
        }

        if (e.ctrlKey && key === "u") {
          e.preventDefault();
          return false;
        }

        if (e.ctrlKey && e.shiftKey && ["i", "j", "c"].includes(key)) {
          e.preventDefault();
          return false;
        }
      });
    }

    async function loadWeather(lat, lon) {
      try {
        weatherBadge.textContent = T.weatherUpdating;

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&hourly=weather_code&forecast_hours=3&timezone=auto`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("weather fetch failed");

        const data = await res.json();
        const current = data.current;
        const temp = Math.round(current.temperature_2m);
        const currentInfo = getWeatherInfo(current.weather_code);

        const nextHourCode = data.hourly?.weather_code?.[1];
        const nextHourInfo = typeof nextHourCode !== "undefined"
          ? getWeatherInfo(nextHourCode)
          : null;

        const nextWeatherHTML = nextHourInfo ? `
          <div class="next-weather">
            <span class="next-weather-icon">${nextHourInfo.icon}</span>
            <span>${T.afterHour} ${nextHourInfo.text}</span>
          </div>
        ` : "";

        weatherContent.innerHTML = `
          <div class="weather-card-content">
            <div class="weather-icon">${currentInfo.icon}</div>
            <div>
              <div class="weather-temp">${temp}°</div>
              <div class="weather-desc">${currentInfo.text}</div>
              ${nextWeatherHTML}
            </div>
          </div>
        `;

        weatherBadge.textContent = T.weatherUpdated;
      } catch (err) {
        showWeatherError(T.weatherError);
      }
    }

    async function loadAreaName(lat, lon) {
      try {
        locationBadge.textContent = T.locationSearching;

        const requestLang = (navigator.language || "en").split("-")[0];
        const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=${encodeURIComponent(requestLang)}`;

        const res = await fetch(url, {
          headers: { "Accept": "application/json" }
        });

        if (!res.ok) throw new Error("nominatim fetch failed");

        const data = await res.json();
        const address = data.address || {};

        const bestArea =
          address.suburb ||
          address.neighbourhood ||
          address.neighborhood ||
          address.quarter ||
          address.city_district ||
          address.residential ||
          address.borough ||
          address.hamlet ||
          address.village ||
          address.town ||
          address.city ||
          T.areaCurrent;

        areaName.textContent = bestArea;
        locationBadge.textContent = T.locationDone;
      } catch (err) {
        showLocationError(T.locationError);
      }
    }

    function showWeatherError(message) {
      weatherBadge.textContent = T.weatherUnavailable;
      weatherContent.innerHTML = `<div class="error-text">${message}</div>`;
    }

    function showLocationError(message) {
      locationBadge.textContent = T.weatherUnavailable;
      areaName.textContent = message;
    }

    function getWeatherInfo(code) {
      const map = {
        0:  { text: T.clear, icon: "☀️" },
        1:  { text: T.mostlyClear, icon: "🌤️" },
        2:  { text: T.partlyCloudy, icon: "⛅" },
        3:  { text: T.cloudy, icon: "☁️" },
        45: { text: T.fog, icon: "🌫️" },
        48: { text: T.denseFog, icon: "🌫️" },
        51: { text: T.lightDrizzle, icon: "🌦️" },
        53: { text: T.moderateDrizzle, icon: "🌦️" },
        55: { text: T.heavyDrizzle, icon: "🌧️" },
        61: { text: T.lightRain, icon: "🌦️" },
        63: { text: T.moderateRain, icon: "🌧️" },
        65: { text: T.heavyRain, icon: "⛈️" },
        71: { text: T.lightSnow, icon: "🌨️" },
        73: { text: T.snow, icon: "❄️" },
        75: { text: T.heavySnow, icon: "❄️" },
        77: { text: T.snowGrains, icon: "❄️" },
        80: { text: T.lightShowers, icon: "🌦️" },
        81: { text: T.showers, icon: "🌧️" },
        82: { text: T.heavyShowers, icon: "⛈️" },
        85: { text: T.lightSnowShowers, icon: "🌨️" },
        86: { text: T.heavySnowShowers, icon: "❄️" },
        95: { text: T.thunderstorm, icon: "⛈️" },
        96: { text: T.thunderHailLight, icon: "⛈️" },
        99: { text: T.thunderHailHeavy, icon: "⛈️" }
      };

      return map[code] || { text: T.currentWeatherUnknown, icon: "🌍" };
    }
  </script>
