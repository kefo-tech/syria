<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الخدمات | KeFo.tech</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="بوابة خدمات ذكية تعرض الطقس والمنطقة الحالية مع خدمات إضافية قابلة للتوسعة." />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <style>
    :root{
      --bg1:#06111f;
      --bg2:#0a1730;
      --bg3:#071d40;
      --card:rgba(255,255,255,0.08);
      --card-border:rgba(255,255,255,0.13);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#5cc8ff;
      --accent2:#61e59a;
      --shadow:0 18px 45px rgba(0,0,0,.28);
      --radius:26px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      -webkit-touch-callout:none;
    }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
    }

    body{
      font-family:"Tahoma","Arial",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(92,200,255,.14), transparent 24%),
        radial-gradient(circle at top left, rgba(97,229,154,.08), transparent 22%),
        linear-gradient(160deg,var(--bg1),var(--bg2) 50%, var(--bg3));
      user-select:none;
      -webkit-user-select:none;
      -moz-user-select:none;
      -ms-user-select:none;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(transparent 0%, rgba(255,255,255,.02) 50%, transparent 100%);
      mix-blend-mode:screen;
      opacity:.6;
    }

    .container{
      width:min(1120px, 94%);
      margin:auto;
      padding:18px 0 30px;
    }

    .header-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .top-action-btn{
      border:none;
      outline:none;
      cursor:pointer;
      color:#fff;
      font-family:inherit;
      font-size:.92rem;
      font-weight:800;
      background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.13);
      border-radius:999px;
      padding:13px 18px;
      box-shadow:var(--shadow);
      transition:.22s ease;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .top-action-btn:hover{
      transform:translateY(-2px);
      border-color:rgba(92,200,255,.4);
      background:linear-gradient(180deg, rgba(92,200,255,.18), rgba(255,255,255,.05));
    }

    .top-cards{
      display:grid;
      grid-template-columns:minmax(0, 1.06fr) minmax(0, .94fr);
      gap:14px;
      margin-bottom:22px;
      align-items:stretch;
    }

    .glass-card{
      background:var(--card);
      border:1px solid var(--card-border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      position:relative;
      overflow:hidden;
      min-height:170px;
    }

    .glass-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.08), transparent 48%);
      pointer-events:none;
    }

    .card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      position:relative;
      z-index:3;
      margin-bottom:14px;
    }

    .card-title{
      margin:0;
      font-size:clamp(.95rem, 1.7vw, 1.08rem);
      font-weight:800;
      color:#fff;
      line-height:1.3;
    }

    .badge{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      color:#e2e8f0;
      padding:7px 10px;
      border-radius:999px;
      font-size:clamp(.68rem, 1.2vw, .84rem);
      white-space:nowrap;
      flex-shrink:0;
      box-shadow:inset 0 0 14px rgba(255,255,255,.03);
    }

    /* Weather Card */
    .weather-card{
      min-height:210px;
    }

    .weather-scene{
      position:absolute;
      inset:0;
      z-index:1;
      overflow:hidden;
      pointer-events:none;
    }

    .weather-scene.day{
      background:
        radial-gradient(circle at 20% 18%, rgba(255,235,130,.22), transparent 18%),
        linear-gradient(180deg, rgba(74,146,255,.18), rgba(255,255,255,.01));
    }

    .weather-scene.night{
      background:
        radial-gradient(circle at 78% 18%, rgba(200,220,255,.14), transparent 14%),
        linear-gradient(180deg, rgba(21,31,66,.28), rgba(8,14,28,.04));
    }

    .sun, .moon{
      position:absolute;
      top:22px;
      left:22px;
      width:62px;
      height:62px;
      border-radius:50%;
    }

    .sun{
      background:radial-gradient(circle, #fff7b0 0%, #ffd65c 45%, #ffb300 72%, rgba(255,179,0,.2) 100%);
      box-shadow:0 0 28px rgba(255,208,89,.55), 0 0 65px rgba(255,208,89,.18);
      animation:sunPulse 4s ease-in-out infinite;
      display:none;
    }

    .moon{
      background:radial-gradient(circle at 35% 35%, #f8fbff 0%, #d8e7ff 60%, #b5c7ec 100%);
      box-shadow:0 0 24px rgba(200,225,255,.28);
      display:none;
    }

    .moon::after{
      content:"";
      position:absolute;
      top:7px;
      left:18px;
      width:52px;
      height:52px;
      border-radius:50%;
      background:rgba(12,19,40,.95);
    }

    .stars{
      position:absolute;
      inset:0;
      display:none;
    }

    .stars span{
      position:absolute;
      width:3px;
      height:3px;
      border-radius:50%;
      background:#fff;
      opacity:.75;
      animation:starBlink 2.4s ease-in-out infinite;
    }

    .stars span:nth-child(1){ top:24px; right:85px; animation-delay:.3s; }
    .stars span:nth-child(2){ top:52px; right:50px; animation-delay:1s; }
    .stars span:nth-child(3){ top:40px; right:120px; animation-delay:1.6s; }
    .stars span:nth-child(4){ top:78px; right:88px; animation-delay:.8s; }
    .stars span:nth-child(5){ top:22px; right:150px; animation-delay:1.2s; }

    .cloud{
      position:absolute;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.28), rgba(255,255,255,.14));
      box-shadow:inset 0 -8px 18px rgba(0,0,0,.08);
      opacity:.95;
    }

    .cloud::before,
    .cloud::after{
      content:"";
      position:absolute;
      background:inherit;
      border-radius:50%;
    }

    .cloud::before{
      width:46%;
      height:80%;
      top:-38%;
      left:14%;
    }

    .cloud::after{
      width:36%;
      height:68%;
      top:-24%;
      right:15%;
    }

    .cloud.a{
      width:122px;
      height:42px;
      top:64px;
      right:28px;
      animation:cloudMoveA 9s ease-in-out infinite;
    }

    .cloud.b{
      width:88px;
      height:32px;
      top:108px;
      left:28px;
      opacity:.72;
      animation:cloudMoveB 12s ease-in-out infinite;
    }

    .rain,
    .snow,
    .fog,
    .lightning{
      position:absolute;
      inset:0;
      display:none;
      pointer-events:none;
    }

    .rain span{
      position:absolute;
      width:2px;
      height:15px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(190,230,255,0), rgba(190,230,255,.95));
      animation:rainFall 1s linear infinite;
      opacity:.85;
    }

    .rain span:nth-child(1){ left:18%; top:42%; animation-delay:.1s; }
    .rain span:nth-child(2){ left:28%; top:38%; animation-delay:.3s; }
    .rain span:nth-child(3){ left:36%; top:46%; animation-delay:.6s; }
    .rain span:nth-child(4){ left:48%; top:40%; animation-delay:.2s; }
    .rain span:nth-child(5){ left:58%; top:48%; animation-delay:.7s; }
    .rain span:nth-child(6){ left:70%; top:44%; animation-delay:.4s; }
    .rain span:nth-child(7){ left:79%; top:38%; animation-delay:.9s; }
    .rain span:nth-child(8){ left:87%; top:46%; animation-delay:.5s; }

    .snow span{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:rgba(255,255,255,.95);
      box-shadow:0 0 8px rgba(255,255,255,.25);
      animation:snowFall 5s linear infinite;
    }

    .snow span:nth-child(1){ left:18%; top:35%; animation-delay:.2s; }
    .snow span:nth-child(2){ left:28%; top:42%; animation-delay:1.3s; }
    .snow span:nth-child(3){ left:42%; top:38%; animation-delay:.7s; }
    .snow span:nth-child(4){ left:55%; top:46%; animation-delay:2.1s; }
    .snow span:nth-child(5){ left:68%; top:40%; animation-delay:1.1s; }
    .snow span:nth-child(6){ left:80%; top:36%; animation-delay:2.8s; }

    .fog span{
      position:absolute;
      left:-10%;
      width:65%;
      height:24px;
      border-radius:999px;
      background:linear-gradient(90deg, rgba(255,255,255,0), rgba(230,238,248,.16), rgba(255,255,255,0));
      filter:blur(4px);
      animation:fogMove 9s linear infinite;
    }

    .fog span:nth-child(1){ top:78px; animation-delay:0s; }
    .fog span:nth-child(2){ top:110px; animation-delay:2.7s; }
    .fog span:nth-child(3){ top:138px; animation-delay:5s; }

    .lightning span{
      position:absolute;
      right:26%;
      top:48px;
      width:0;
      height:0;
      border-left:10px solid transparent;
      border-right:6px solid transparent;
      border-top:34px solid rgba(255,250,200,.95);
      transform:skewX(-12deg) rotate(12deg);
      filter:drop-shadow(0 0 10px rgba(255,245,175,.3));
      animation:flashStorm 3.6s infinite;
    }

    .scene-sunny .sun{ display:block; }
    .scene-night-clear .moon,
    .scene-night-cloudy .moon,
    .scene-night-rainy .moon,
    .scene-night-snowy .moon{ display:block; }
    .scene-night-clear .stars,
    .scene-night-cloudy .stars,
    .scene-night-rainy .stars,
    .scene-night-snowy .stars{ display:block; }

    .scene-partly-cloudy .sun{ display:block; }
    .scene-cloudy .cloud,
    .scene-partly-cloudy .cloud,
    .scene-rainy .cloud,
    .scene-snowy .cloud,
    .scene-stormy .cloud,
    .scene-foggy .cloud,
    .scene-night-cloudy .cloud,
    .scene-night-rainy .cloud,
    .scene-night-snowy .cloud{
      display:block;
    }

    .scene-rainy .rain,
    .scene-night-rainy .rain{ display:block; }

    .scene-snowy .snow,
    .scene-night-snowy .snow{ display:block; }

    .scene-foggy .fog{ display:block; }

    .scene-stormy .rain,
    .scene-stormy .lightning{ display:block; }

    .weather-card-content{
      position:relative;
      z-index:2;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      min-height:126px;
      padding-top:16px;
    }

    .weather-main{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-width:62%;
    }

    .weather-temp{
      font-size:clamp(2rem, 4.3vw, 3rem);
      font-weight:900;
      line-height:1;
      letter-spacing:-1px;
      text-shadow:0 4px 18px rgba(0,0,0,.18);
    }

    .weather-desc{
      color:#eef7ff;
      font-size:clamp(.9rem, 1.8vw, 1.04rem);
      line-height:1.4;
      font-weight:700;
    }

    .next-weather{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.12);
      padding:8px 12px;
      border-radius:999px;
      color:#edf7ff;
      font-size:clamp(.72rem, 1.5vw, .84rem);
      line-height:1.4;
      flex-wrap:wrap;
      width:fit-content;
      backdrop-filter:blur(10px);
    }

    .next-weather-icon{
      width:22px;
      height:22px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:rgba(255,255,255,.08);
      font-size:.95rem;
    }

    .weather-side-icon{
      position:relative;
      z-index:2;
      width:82px;
      height:82px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:inset 0 0 24px rgba(255,255,255,.03);
      font-size:2rem;
      flex-shrink:0;
    }

    /* Location Card */
    .location-card{
      min-height:210px;
    }

    .location-card::after{
      content:"";
      position:absolute;
      inset:auto -40px -40px auto;
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(92,200,255,.12), transparent 70%);
      pointer-events:none;
    }

    .location-card-content{
      position:relative;
      z-index:2;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:126px;
      gap:8px;
    }

    .welcome-text{
      color:var(--muted);
      font-size:clamp(.82rem, 1.8vw, .98rem);
      line-height:1.5;
    }

    .area-name{
      margin:0;
      font-size:clamp(1.25rem, 3.2vw, 2.15rem);
      font-weight:900;
      line-height:1.2;
      color:#fff;
      word-break:break-word;
      overflow-wrap:anywhere;
      text-shadow:0 5px 18px rgba(0,0,0,.18);
    }

    .location-subline{
      color:#a9c3dd;
      font-size:.86rem;
      opacity:.92;
    }

    /* Services */
    .services-title{
      margin:0 0 14px;
      font-size:clamp(1rem, 1.9vw, 1.12rem);
      font-weight:900;
      color:#fff;
    }

    .services-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:14px;
    }

    .service-btn{
      text-decoration:none;
      color:#fff;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.12);
      border-radius:28px;
      min-height:128px;
      padding:16px 12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:10px;
      transition:.24s ease;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      backdrop-filter:blur(14px);
    }

    .service-btn::before{
      content:"";
      position:absolute;
      inset:-40% auto auto -20%;
      width:120px;
      height:120px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(92,200,255,.12), transparent 70%);
      pointer-events:none;
    }

    .service-btn:hover{
      transform:translateY(-4px);
      border-color:rgba(92,200,255,.42);
      background:linear-gradient(180deg, rgba(92,200,255,.12), rgba(255,255,255,.05));
    }

    .service-icon{
      width:58px;
      height:58px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.13);
      box-shadow:inset 0 0 18px rgba(255,255,255,.04);
      flex-shrink:0;
    }

    .service-icon svg{
      width:28px;
      height:28px;
      stroke:#eaf6ff;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .service-title{
      font-size:clamp(.84rem, 1.8vw, 1rem);
      font-weight:800;
      line-height:1.35;
      position:relative;
      z-index:1;
    }

    .service-sub{
      font-size:clamp(.7rem, 1.42vw, .82rem);
      color:var(--muted);
      line-height:1.45;
      position:relative;
      z-index:1;
    }

    .osm-note{
      margin-top:12px;
      color:#9bb2ca;
      font-size:clamp(.68rem, 1.3vw, .8rem);
      text-align:center;
      line-height:1.6;
    }

    .copyright{
      margin-top:26px;
      text-align:center;
      color:#cbd5e1;
      font-size:clamp(.76rem, 1.6vw, .92rem);
      opacity:.92;
      padding:14px 10px;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .loading-text,
    .error-text{
      color:#fff;
      font-size:clamp(.8rem, 1.7vw, .98rem);
      line-height:1.7;
      position:relative;
      z-index:2;
    }

    /* Animations */
    @keyframes sunPulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.06); }
    }

    @keyframes starBlink{
      0%,100%{ opacity:.25; transform:scale(1); }
      50%{ opacity:1; transform:scale(1.25); }
    }

    @keyframes cloudMoveA{
      0%,100%{ transform:translateX(0); }
      50%{ transform:translateX(-12px); }
    }

    @keyframes cloudMoveB{
      0%,100%{ transform:translateX(0); }
      50%{ transform:translateX(15px); }
    }

    @keyframes rainFall{
      0%{ transform:translateY(-8px); opacity:0; }
      20%{ opacity:.9; }
      100%{ transform:translateY(38px); opacity:0; }
    }

    @keyframes snowFall{
      0%{ transform:translateY(-8px) translateX(0); opacity:0; }
      10%{ opacity:1; }
      100%{ transform:translateY(54px) translateX(10px); opacity:0; }
    }

    @keyframes fogMove{
      0%{ transform:translateX(-18%); opacity:0; }
      15%,70%{ opacity:1; }
      100%{ transform:translateX(135%); opacity:0; }
    }

    @keyframes flashStorm{
      0%, 82%, 100%{ opacity:0; }
      84%{ opacity:1; }
      86%{ opacity:0; }
      88%{ opacity:1; }
      90%{ opacity:0; }
    }

    @media (max-width: 820px){
      .top-cards{
        grid-template-columns:1fr 1fr;
        gap:10px;
      }

      .weather-card-content{
        gap:10px;
      }

      .weather-main{
        max-width:100%;
      }
    }

    @media (max-width: 700px){
      .container{
        width:min(97%, 97%);
        padding:12px 0 24px;
      }

      .header-actions{
        justify-content:center;
      }

      .top-cards{
        grid-template-columns:1fr 1fr;
        gap:10px;
      }

      .glass-card{
        min-height:180px;
        padding:12px;
        border-radius:20px;
      }

      .weather-card,
      .location-card{
        min-height:180px;
      }

      .weather-card-content{
        min-height:108px;
        align-items:flex-end;
      }

      .weather-side-icon{
        width:62px;
        height:62px;
        font-size:1.55rem;
      }

      .sun, .moon{
        width:48px;
        height:48px;
        top:18px;
        left:18px;
      }

      .moon::after{
        width:40px;
        height:40px;
        left:14px;
      }

      .cloud.a{ width:92px; height:34px; top:54px; right:18px; }
      .cloud.b{ width:74px; height:26px; top:92px; left:18px; }

      .services-grid{
        gap:10px;
      }

      .service-btn{
        min-height:104px;
        padding:12px 8px;
        border-radius:22px;
      }

      .service-sub{
        display:none;
      }
    }

    @media (max-width: 480px){
      .top-cards{
        gap:8px;
      }

      .glass-card{
        min-height:166px;
        padding:10px;
        border-radius:18px;
      }

      .card-head{
        margin-bottom:8px;
      }

      .badge{
        font-size:.62rem;
        padding:5px 8px;
      }

      .weather-temp{
        font-size:1.7rem;
      }

      .weather-desc{
        font-size:.8rem;
      }

      .next-weather{
        font-size:.66rem;
        padding:6px 9px;
      }

      .area-name{
        font-size:1.12rem;
      }

      .welcome-text{
        font-size:.75rem;
      }

      .service-btn{
        min-height:96px;
        padding:10px 6px;
        border-radius:20px;
      }

      .service-icon{
        width:50px;
        height:50px;
      }

      .service-icon svg{
        width:24px;
        height:24px;
      }

      .service-title{
        font-size:.72rem;
      }

      .top-action-btn{
        font-size:.8rem;
        padding:11px 14px;
      }
    }
  </style>
</head>
<body oncontextmenu="return false">
  <div class="container">

    <div class="header-actions">
      <button class="top-action-btn" id="installBtn"></button>
      <button class="top-action-btn" id="shareBtn"></button>
    </div>

    <section class="top-cards">
      <div class="glass-card weather-card">
        <div class="weather-scene day scene-sunny" id="weatherScene">
          <div class="sun"></div>
          <div class="moon"></div>
          <div class="stars">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="cloud a"></div>
          <div class="cloud b"></div>
          <div class="rain">
            <span></span><span></span><span></span><span></span>

            <path d="M9 14h4"></path>
          </svg>
        `,
        globe: `
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M3 12h18"></path>
            <path d="M12 3a14 14 0 0 1 0 18"></path>
            <path d="M12 3a14 14 0 0 0 0 18"></path>
          </svg>
        `,
        box: `
          <svg viewBox="0 0 24 24">
            <path d="M4 8l8-4 8 4-8 4-8-4z"></path>
            <path d="M4 8v8l8 4 8-4V8"></path>
            <path d="M12 12v8"></path>
          </svg>
        `,
        settings: `
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3.2"></circle>
            <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 1 1-4 0v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 1 1 0-4h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4a2 2 0 1 1 4 0v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6H20a2 2 0 1 1 0 4h-.2a1 1 0 0 0-.9.6z"></path>
          </svg>
        `
      };

      return icons[type] || icons.globe;
    }

    function registerServiceWorker() {
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    }

    function setupInstallPrompt() {
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
      });

      installBtn.addEventListener("click", async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
        } else {
          alert(T.installHint);
        }
      });
    }

    function setupShare() {
      shareBtn.addEventListener("click", async () => {
        const shareData = {
          title: T.title,
          text: T.shareText,
          url: window.location.href
        };

        try {
          if (navigator.share) {
            await navigator.share(shareData);
          } else {
            await navigator.clipboard.writeText(window.location.href);
            alert(T.copied);
          }
        } catch (e) {}
      });
    }

    function setupProtection() {
      document.addEventListener("contextmenu", (e) => e.preventDefault());
      document.addEventListener("dragstart", (e) => e.preventDefault());
      document.addEventListener("selectstart", (e) => e.preventDefault());
      document.addEventListener("copy", (e) => e.preventDefault());
      document.addEventListener("cut", (e) => e.preventDefault());

      document.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();

        if (e.key === "F12") {
          e.preventDefault();
          return false;
        }

        if (e.ctrlKey && key === "u") {
          e.preventDefault();
          return false;
        }

        if (e.ctrlKey && e.shiftKey && ["i", "j", "c"].includes(key)) {
          e.preventDefault();
          return false;
        }
      });
    }

    async function loadWeather(lat, lon) {
      try {
        weatherBadge.textContent = T.weatherUpdating;

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,is_day&hourly=weather_code&forecast_hours=3&timezone=auto`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("weather fetch failed");

        const data = await res.json();
        const current = data.current;
        const temp = Math.round(current.temperature_2m);
        const isDay = Number(current.is_day) === 1;
        const currentInfo = getWeatherInfo(current.weather_code);

        const nextHourCode = data.hourly?.weather_code?.[1];
        const nextHourInfo = typeof nextHourCode !== "undefined"
          ? getWeatherInfo(nextHourCode)
          : null;

        const nextWeatherHTML = nextHourInfo ? `
          <div class="next-weather">
            <span class="next-weather-icon">${nextHourInfo.icon}</span>
            <span>${T.afterHour} ${nextHourInfo.text}</span>
          </div>
        ` : "";

        weatherContent.innerHTML = `
          <div class="weather-card-content">
            <div class="weather-main">
              <div class="weather-temp">${temp}°</div>
              <div class="weather-desc">${currentInfo.text}</div>
              ${nextWeatherHTML}
            </div>
            <div class="weather-side-icon">${currentInfo.icon}</div>
          </div>
        `;

        setWeatherScene(current.weather_code, isDay);
        weatherBadge.textContent = T.weatherUpdated;
      } catch (err) {
        showWeatherError(T.weatherError);
      }
    }

    function setWeatherScene(code, isDay) {
      weatherScene.className = "weather-scene";

      const periodClass = isDay ? "day" : "night";
      const sceneClass = getSceneClass(code, isDay);

      weatherScene.classList.add(periodClass, sceneClass);
    }

    function getSceneClass(code, isDay) {
      if ([95, 96, 99].includes(code)) return "scene-stormy";
      if ([45, 48].includes(code)) return "scene-foggy";
      if ([71, 73, 75, 77, 85, 86].includes(code)) return isDay ? "scene-snowy" : "scene-night-snowy";
      if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return isDay ? "scene-rainy" : "scene-night-rainy";
      if ([1, 2].includes(code)) return isDay ? "scene-partly-cloudy" : "scene-night-cloudy";
      if ([3].includes(code)) return isDay ? "scene-cloudy" : "scene-night-cloudy";
      return isDay ? "scene-sunny" : "scene-night-clear";
    }

    async function loadAreaName(lat, lon) {
      try {
        locationBadge.textContent = T.locationSearching;

        const requestLang = (navigator.language || "en").split("-")[0];
        const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=${encodeURIComponent(requestLang)}`;

        const res = await fetch(url, {
          headers: { "Accept": "application/json" }
        });

        if (!res.ok) throw new Error("nominatim fetch failed");

        const data = await res.json();
        const address = data.address || {};

        const bestArea =
          address.suburb ||
          address.neighbourhood ||
          address.neighborhood ||
          address.quarter ||
          address.city_district ||
          address.residential ||
          address.borough ||
          address.hamlet ||
          address.village ||
          address.town ||
          address.city ||
          T.areaCurrent;

        areaName.textContent = bestArea;
        locationBadge.textContent = T.locationDone;
      } catch (err) {
        showLocationError(T.locationError);
      }
    }

    function showWeatherError(message) {
      weatherBadge.textContent = T.weatherUnavailable;
      weatherContent.innerHTML = `<div class="error-text">${message}</div>`;
      weatherScene.className = "weather-scene day scene-cloudy";
    }

    function showLocationError(message) {
      locationBadge.textContent = T.weatherUnavailable;
      areaName.textContent = message;
    }

    function getWeatherInfo(code) {
      const map = {
        0:  { text: T.clear, icon: "☀️" },
        1:  { text: T.mostlyClear, icon: "🌤️" },
        2:  { text: T.partlyCloudy, icon: "⛅" },
        3:  { text: T.cloudy, icon: "☁️" },
        45: { text: T.fog, icon: "🌫️" },
        48: { text: T.denseFog, icon: "🌫️" },
        51: { text: T.lightDrizzle, icon: "🌦️" },
        53: { text: T.moderateDrizzle, icon: "🌦️" },
        55: { text: T.heavyDrizzle, icon: "🌧️" },
        61: { text: T.lightRain, icon: "🌦️" },
        63: { text: T.moderateRain, icon: "🌧️" },
        65: { text: T.heavyRain, icon: "⛈️" },
        71: { text: T.lightSnow, icon: "🌨️" },
        73: { text: T.snow, icon: "❄️" },
        75: { text: T.heavySnow, icon: "❄️" },
        77: { text: T.snowGrains, icon: "❄️" },
        80: { text: T.lightShowers, icon: "🌦️" },
        81: { text: T.showers, icon: "🌧️" },
        82: { text: T.heavyShowers, icon: "⛈️" },
        85: { text: T.lightSnowShowers, icon: "🌨️" },
        86: { text: T.heavySnowShowers, icon: "❄️" },
        95: { text: T.thunderstorm, icon: "⛈️" },
        96: { text: T.thunderHailLight, icon: "⛈️" },
        99: { text: T.thunderHailHeavy, icon: "⛈️" }
      };

      return map[code] || { text: T.currentWeatherUnknown, icon: "🌍" };
    }
  </script>
