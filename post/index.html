<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>عبارات إسلامية عشوائية | KeFo.tech</title>
  <meta name="description" content="موقع يعرض عبارات إسلامية عشوائية بتصميم أنيق ومتجاوب مع الهاتف، مع إمكانية النسخ والمشاركة بسهولة." />
  <meta name="theme-color" content="#0f2b24" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="KeFo.tech" />
  <meta property="og:title" content="عبارات إسلامية عشوائية | KeFo.tech" />
  <meta property="og:description" content="موقع يعرض عبارات إسلامية عشوائية بتصميم أنيق ومتجاوب مع الهاتف، مع أزرار نسخ ومشاركة." />
  <meta property="og:url" content="https://kefo-tech.github.io/" />
  <meta property="og:image" content="https://kefo-tech.github.io/images/islamic-share.jpg" />
  <meta property="og:image:alt" content="عبارات إسلامية عشوائية من KeFo.tech" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="عبارات إسلامية عشوائية | KeFo.tech" />
  <meta name="twitter:description" content="موقع يعرض عبارات إسلامية عشوائية بتصميم أنيق ومتجاوب مع الهاتف." />
  <meta name="twitter:image" content="https://kefo-tech.github.io/images/islamic-share.jpg" />

  <style>
    :root{
      --bg1:#071b16;
      --bg2:#0f2b24;
      --card:#11372d;
      --card2:#18493c;
      --gold:#d8b36a;
      --gold-soft:#f0d7a2;
      --green:#2f8f6b;
      --green-soft:#78c4a4;
      --text:#f9f6ef;
      --muted:#d5d0c3;
      --shadow:0 10px 35px rgba(0,0,0,.28);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:"Tahoma","Arial",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(216,179,106,.12), transparent 25%),
        radial-gradient(circle at bottom left, rgba(120,196,164,.10), transparent 25%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.10;
      background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><g fill='none' stroke='%23d8b36a' stroke-width='1.2' opacity='0.5'><path d='M90 10 L110 50 L150 60 L120 90 L128 130 L90 110 L52 130 L60 90 L30 60 L70 50 Z'/><circle cx='90' cy='90' r='70'/></g></svg>");
      background-size:180px 180px;
      background-repeat:repeat;
    }

    .page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        calc(18px + env(safe-area-inset-top))
        16px
        calc(18px + env(safe-area-inset-bottom))
        16px;
    }

    .wrap{
      width:min(100%, 560px);
    }

    .hero{
      text-align:center;
      margin-bottom:18px;
      padding:10px 6px;
    }

    .hero-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:rgba(216,179,106,.13);
      border:1px solid rgba(240,215,162,.25);
      color:var(--gold-soft);
      padding:8px 14px;
      border-radius:999px;
      font-size:13px;
      margin-bottom:12px;
      backdrop-filter: blur(6px);
    }

    .hero h1{
      margin:0 0 10px;
      font-size:clamp(24px, 6vw, 38px);
      line-height:1.35;
      color:#fff7e3;
      text-shadow:0 2px 10px rgba(0,0,0,.25);
    }

    .hero p{
      margin:0 auto;
      max-width:470px;
      color:var(--muted);
      font-size:15px;
      line-height:1.9;
    }

    .card{
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        linear-gradient(145deg, var(--card), var(--card2));
      border:1px solid rgba(240,215,162,.18);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      padding:20px 16px 18px;
      backdrop-filter: blur(8px);
    }

    .card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:4px;
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity:.95;
    }

    .ornament{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-bottom:16px;
      color:var(--gold);
      font-size:14px;
      opacity:.95;
    }

    .ornament .line{
      height:1px;
      flex:1;
      background:linear-gradient(90deg, transparent, rgba(216,179,106,.75), transparent);
      max-width:90px;
    }

    .quote-box{
      min-height:180px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px 8px;
    }

    .quote{
      font-size:clamp(20px, 5.6vw, 30px);
      line-height:2;
      color:#fffdf7;
      margin:0;
      transition:opacity .35s ease, transform .35s ease;
      text-shadow:0 2px 10px rgba(0,0,0,.18);
    }

    .quote.fade-out{
      opacity:0;
      transform:translateY(8px) scale(.985);
    }

    .sub{
      text-align:center;
      color:var(--green-soft);
      font-size:13px;
      margin-top:4px;
      margin-bottom:18px;
      line-height:1.8;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:8px;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:16px;
      padding:14px 12px;
      font-size:15px;
      font-weight:700;
      transition:.2s ease;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:50px;
    }

    .btn:active{
      transform:scale(.98);
    }

    .btn-main{
      background:linear-gradient(135deg, var(--gold), #b8893a);
      color:#1f1708;
      box-shadow:0 8px 20px rgba(216,179,106,.22);
    }

    .btn-soft{
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
    }

    .socials{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
      margin-top:12px;
    }

    .social-btn{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
      color:#fff;
      text-decoration:none;
      border-radius:16px;
      min-height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:700;
      transition:.2s ease;
      padding:10px 6px;
      text-align:center;
      cursor:pointer;
    }

    .social-btn:active{
      transform:scale(.97);
    }

    .note{
      margin-top:14px;
      padding:12px;
      border-radius:16px;
      background:rgba(216,179,106,.08);
      border:1px solid rgba(216,179,106,.14);
      color:#efe2c0;
      font-size:13px;
      line-height:1.9;
      text-align:center;
    }

    .footer{
      text-align:center;
      margin-top:18px;
      color:#cdbf9a;
      font-size:12px;
      line-height:1.8;
      padding-bottom:max(4px, env(safe-area-inset-bottom));
    }

    .tiny{
      margin-top:8px;
      font-size:12px;
      color:#9dc4b4;
      text-align:center;
      min-height:20px;
    }

    @media (max-width: 420px){
      .card{
        padding:18px 13px 16px;
        border-radius:20px;
      }

      .actions{
        grid-template-columns:1fr;
      }

      .socials{
        grid-template-columns:1fr 1fr;
      }

      .quote-box{
        min-height:160px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="hero">
        <div class="hero-badge">☪ عبارات إيمانية ملهمة</div>
        
      </section>

      <section class="card">
        <div class="ornament">
          <div class="line"></div>
          <div>﷽</div>
          <div class="line"></div>
        </div>

        <div class="quote-box">
          <p class="quote" id="quoteText">جاري تحميل العبارة...</p>
        </div>


        <div class="actions">
          <button class="btn btn-main" id="randomBtn">🔄 عبارة عشوائية</button>
          <button class="btn btn-soft" id="copyBtn">📋 نسخ العبارة</button>
        </div>

        <div class="socials">
          <button class="social-btn" id="shareGeneralBtn">📲 مشاركة عامة</button>
          <a class="social-btn" id="whatsappShare" href="#" target="_blank" rel="noopener">واتساب</a>
          <a class="social-btn" id="telegramShare" href="#" target="_blank" rel="noopener">تلغرام</a>
          <a class="social-btn" id="facebookShare" href="#" target="_blank" rel="noopener">فيسبوك</a>
        </div>

        

        <div class="tiny" id="statusText">مرحبًا بك 🌙</div>
      </section>

      <div class="footer">
        © KeFo.tech — جميع الحقوق محفوظة
      </div>
    </div>
  </main>

  <script>
    const quotes = [
      "مَن جعل بينه وبين الله صلةً صادقة، جعل الله له من كل ضيقٍ مخرجًا.",
      "ليس كل تأخير حرمانًا، فقد يُخفي الله لك في التأخير رحمة.",
      "إذا ضاقت بك الدنيا، فتذكّر أن باب السماء لا يُغلق.",
      "القلب الذي يذكر الله كثيرًا، تهون عليه هموم الحياة.",
      "أجمل الطمأنينة أن تعلم أن الله يدبّر أمرك كله.",
      "كلما انكسرتَ لله، جبرك الله بلطفٍ لا تتخيله.",
      "من وثق بالله، رأى الخير حتى في أصعب الطرق.",
      "الدعاء نورٌ خفيّ، لكنه يفتح أبوابًا لا يفتحها شيء آخر.",
      "لا تيأس، فالله قادر أن يبدّل حزنك سكينةً في لحظة.",
      "الرضا بالله يُورث القلب سلامًا لا تصنعه الدنيا.",
      "إذا تعثّرت خُطاك، فاعلم أن الله يهيّئ لك طريقًا أفضل.",
      "القرآن حياةٌ للروح، وشفاءٌ لما أثقل القلب.",
      "كل خيرٍ ترجوه، خزائنه عند الله.",
      "حين تظن أن كل شيء انتهى، يبدأ لطف الله.",
      "أكثر ما يطمئن القلب: أن الله يرى، ويسمع، ويعلم.",
      "الصبر ليس انتظارًا مؤلمًا فقط، بل عبادةٌ عظيمة يؤجر الله عليها.",
      "ما دام الله معك، فلا تخشَ من تقلبات الدنيا.",
      "استغفارٌ صادق قد يفتح لك أبواب رزقٍ وفرجٍ لا تتوقعها.",
      "جمّل يومك بالصلاة على النبي ﷺ.",
      "القرب من الله هو الأمان الحقيقي في هذا العالم المضطرب."
    ];

    const quoteText = document.getElementById("quoteText");
    const randomBtn = document.getElementById("randomBtn");
    const copyBtn = document.getElementById("copyBtn");
    const statusText = document.getElementById("statusText");
    const shareGeneralBtn = document.getElementById("shareGeneralBtn");

    const whatsappShare = document.getElementById("whatsappShare");
    const telegramShare = document.getElementById("telegramShare");
    const facebookShare = document.getElementById("facebookShare");

    let currentQuote = "";
    let autoTimer = null;

    function getRandomQuote() {
      if (quotes.length === 1) return quotes[0];
      let newQuote;
      do {
        newQuote = quotes[Math.floor(Math.random() * quotes.length)];
      } while (newQuote === currentQuote);
      return newQuote;
    }

    function updateShareLinks(text) {
      const pageUrl = window.location.href;
      const shareText = text + " 🌿";

      whatsappShare.href = `https://wa.me/?text=${encodeURIComponent(shareText + "\n" + pageUrl)}`;
      telegramShare.href = `https://t.me/share/url?url=${encodeURIComponent(pageUrl)}&text=${encodeURIComponent(shareText)}`;

      /* فيسبوك يشارك الرابط ومعاينته غالباً، وليس العبارة الديناميكية نفسها */
      facebookShare.href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(pageUrl)}`;
    }

    function showQuote(animated = true) {
      const newQuote = getRandomQuote();

      if (animated) {
        quoteText.classList.add("fade-out");

        setTimeout(() => {
          currentQuote = newQuote;
          quoteText.textContent = currentQuote;
          updateShareLinks(currentQuote);
          quoteText.classList.remove("fade-out");
        }, 260);
      } else {
        currentQuote = newQuote;
        quoteText.textContent = currentQuote;
        updateShareLinks(currentQuote);
      }
    }

    async function copyCurrentQuote() {
      try {
        await navigator.clipboard.writeText(currentQuote);
        statusText.textContent = "تم نسخ العبارة بنجاح ✅";
      } catch (e) {
        statusText.textContent = "تعذر النسخ في هذا المتصفح";
      }

      setTimeout(() => {
        statusText.textContent = "تتبدل العبارة تلقائيًا وبشكل عشوائي";
      }, 2200);
    }

    async function shareGeneral() {
      const pageUrl = window.location.href;
      const text = `${currentQuote}\n\n${pageUrl}`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: "عبارات إسلامية عشوائية | KeFo.tech",
            text: currentQuote,
            url: pageUrl
          });
          statusText.textContent = "تم فتح نافذة المشاركة ✅";
        } catch (e) {
          statusText.textContent = "تم إلغاء المشاركة";
        }
      } else {
        await copyCurrentQuote();
        statusText.textContent = "تم نسخ العبارة، شاركها يدويًا مع الرابط ✅";
      }

      setTimeout(() => {
        statusText.textContent = "تتبدل العبارة تلقائيًا وبشكل عشوائي";
      }, 2200);
    }

    function startAutoRandom() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => {
        showQuote(true);
      }, 7000);
    }

    randomBtn.addEventListener("click", () => {
      showQuote(true);
      startAutoRandom();
    });

    copyBtn.addEventListener("click", copyCurrentQuote);
    shareGeneralBtn.addEventListener("click", shareGeneral);

    document.addEventListener("contextmenu", (e) => e.preventDefault(), { passive: false });

    let pressTimer;
    document.addEventListener("touchstart", () => {
      pressTimer = setTimeout(() => {}, 500);
    }, { passive: true });

    document.addEventListener("touchend", () => {
      clearTimeout(pressTimer);
    }, { passive: true });

    document.addEventListener("dragstart", (e) => e.preventDefault());
    document.addEventListener("selectstart", (e) => e.preventDefault());

    showQuote(false);
    startAutoRandom();
  </script>
</body>
</html>
