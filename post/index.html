  <style>
    :root{
      --bg1:#071b16;
      --bg2:#0f2b24;
      --card:#11372d;
      --card2:#18493c;
      --gold:#d8b36a;
      --gold-soft:#f0d7a2;
      --green:#2f8f6b;
      --green-soft:#78c4a4;
      --text:#f9f6ef;
      --muted:#d5d0c3;
      --shadow:0 10px 35px rgba(0,0,0,.28);
      --radius:24px;
      --danger:#ffcf9f;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:"Tahoma","Arial",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(216,179,106,.12), transparent 25%),
        radial-gradient(circle at bottom left, rgba(120,196,164,.10), transparent 25%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.10;
      background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180' viewBox='0 0 180 180'><g fill='none' stroke='%23d8b36a' stroke-width='1.2' opacity='0.5'><path d='M90 10 L110 50 L150 60 L120 90 L128 130 L90 110 L52 130 L60 90 L30 60 L70 50 Z'/><circle cx='90' cy='90' r='70'/></g></svg>");
      background-size:180px 180px;
      background-repeat:repeat;
    }

    .page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:
        calc(18px + env(safe-area-inset-top))
        16px
        calc(18px + env(safe-area-inset-bottom))
        16px;
    }

    .wrap{
      width:min(100%, 620px);
    }

    .hero{
      text-align:center;
      margin-bottom:5px;
      padding:10px 6px;
    }

    .hero-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:rgba(216,179,106,.13);
      border:1px solid rgba(240,215,162,.25);
      color:var(--gold-soft);
      padding:8px 14px;
      border-radius:999px;
      font-size:13px;
      margin-bottom:-5px;
      backdrop-filter: blur(6px);
    }

    .hero h1{
      margin:0 0 10px;
      font-size:clamp(24px, 6vw, 38px);
      line-height:1.35;
      color:#fff7e3;
      text-shadow:0 2px 10px rgba(0,0,0,.25);
    }

    .hero p{
      margin:0 auto;
      max-width:500px;
      color:var(--muted);
      font-size:15px;
      line-height:0.9;
    }

    .search-panel{
      margin-bottom:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(240,215,162,.14);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:12px;
      backdrop-filter: blur(8px);
    }

    .search-row{
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:10px;
      align-items:center;
    }

    .search-input{
      width:100%;
      min-height:52px;
      border:none;
      outline:none;
      border-radius:16px;
      padding:0 16px;
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:15px;
      border:1px solid rgba(255,255,255,.08);
    }

    .search-input::placeholder{
      color:#cfc8b8;
    }

    .mini-btn{
      min-height:52px;
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:16px;
      padding:0 14px;
      font-size:14px;
      font-weight:700;
      color:#fff;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      transition:.2s ease;
      white-space:nowrap;
    }

    .mini-btn:active{
      transform:scale(.98);
    }

    .mini-btn.active{
      background:linear-gradient(135deg, var(--gold), #b8893a);
      color:#1f1708;
      border-color:transparent;
      box-shadow:0 8px 20px rgba(216,179,106,.18);
    }

    .search-hint{
      text-align:center;
      margin-top:10px;
      color:var(--green-soft);
      font-size:13px;
      line-height:1.8;
      min-height:22px;
    }

    .card{
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
        linear-gradient(145deg, var(--card), var(--card2));
      border:1px solid rgba(240,215,162,.18);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      padding:1px 16px 1px;
      backdrop-filter: blur(8px);
    }

    .card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:4px;
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity:.95;
    }

    .ornament{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-bottom:1px;
      color:var(--gold);
      font-size:14px;
      opacity:.95;
    }

    .ornament .line{
      height:1px;
      flex:1;
      background:linear-gradient(90deg, transparent, rgba(216,179,106,.75), transparent);
      max-width:90px;
    }

    .quote-box{
      min-height:210px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:1px 8px;
    }

    .quote{
      font-size:clamp(20px, 5.6vw, 30px);
      line-height:2;
      color:#fffdf7;
      margin:0;
      text-shadow:0 2px 10px rgba(0,0,0,.18);
      white-space:pre-wrap;
      word-break:break-word;
    }

    .cursor{
      display:inline-block;
      width:2px;
      height:1.1em;
      background:var(--gold-soft);
      vertical-align:middle;
      margin-right:6px;
      animation:blink 0.8s infinite;
      border-radius:2px;
    }

    @keyframes blink{
      0%, 49%{ opacity:1; }
      50%, 100%{ opacity:0; }
    }

    .sub{
      text-align:center;
      color:var(--green-soft);
      font-size:13px;
      margin-top:4px;
      margin-bottom:18px;
      line-height:1.8;
      min-height:24px;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:8px;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:16px;
      padding:14px 12px;
      font-size:15px;
      font-weight:700;
      transition:.2s ease;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:50px;
    }

    .btn:active{
      transform:scale(.98);
    }

    .btn-main{
      background:linear-gradient(135deg, var(--gold), #b8893a);
      color:#1f1708;
      box-shadow:0 8px 20px rgba(216,179,106,.22);
    }

    .btn-soft{
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
    }

    .socials{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
      margin-top:12px;
    }

    .social-btn{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
      color:#fff;
      text-decoration:none;
      border-radius:16px;
      min-height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:700;
      transition:.2s ease;
      padding:10px 6px;
      text-align:center;
      cursor:pointer;
    }

    .social-btn:active{
      transform:scale(.97);
    }

    .note{
      margin-top:14px;
      padding:12px;
      border-radius:16px;
      background:rgba(216,179,106,.08);
      border:1px solid rgba(216,179,106,.14);
      color:#efe2c0;
      font-size:13px;
      line-height:1.9;
      text-align:center;
    }

    .footer{
      text-align:center;
      margin-top:18px;
      color:#cdbf9a;
      font-size:12px;
      line-height:1.8;
      padding-bottom:max(4px, env(safe-area-inset-bottom));
    }

    .tiny{
      margin-top:8px;
      font-size:12px;
      color:#9dc4b4;
      text-align:center;
      min-height:20px;
      line-height:1.8;
    }

    .empty-state{
      color:var(--danger);
      font-size:19px;
      line-height:1.9;
    }

    @media (max-width: 560px){
      .search-row{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 420px){
      .card{
        padding:18px 13px 16px;
        border-radius:20px;
      }

      .actions{
        grid-template-columns:1fr;
      }

      .socials{
        grid-template-columns:1fr 1fr;
      }

      .quote-box{
        min-height:180px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="hero">
        <div class="hero-badge">مولد منشورات تلقائية</div>
        
      </section>

      <section class="search-panel">
        <div class="search-row">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="اكتب كلمة للبحث داخل العبارات... مثل: الله أو الصبر أو الدعاء"
            autocomplete="off"
            spellcheck="false"
          />
          
        </div>
        <div class="search-hint" id="searchHintText">
        </div>
      </section>

      <section class="card">
        <div class="ornament">
          <div class="line"></div>
          <div>﷽</div>
          <div class="line"></div>
        </div>

        <div class="quote-box">
          <p class="quote" id="quoteText"></p>
        </div>

        <div class="sub" id="modeInfoText">
        </div>

        <div class="actions">
          <button class="btn btn-main" id="randomBtn">🔄 عبارة جديدة</button>
          <button class="btn btn-soft" id="copyBtn">📋 نسخ العبارة</button>
        </div>

        <div class="socials">
          <button class="social-btn" id="shareGeneralBtn">📲 مشاركة عامة</button>
          <a class="social-btn" id="whatsappShare" href="#" target="_blank" rel="noopener">واتساب</a>
          <a class="social-btn" id="telegramShare" href="#" target="_blank" rel="noopener">تلغرام</a>
          <a class="social-btn" id="facebookShare" href="#" target="_blank" rel="noopener">فيسبوك</a>
        </div>

        

        <div class="tiny" id="statusText">مرحبًا بك 🌙</div>
      </section>

      <div class="footer">
        © KeFo.tech — جميع الحقوق محفوظة
      </div>
    </div>
  </main>

  <script>
    const quotes = [
      "مَن جعل بينه وبين الله صلةً صادقة، جعل الله له من كل ضيقٍ مخرجًا.",
      "ليس كل تأخير حرمانًا، فقد يُخفي الله لك في التأخير رحمة.",
      "إذا ضاقت بك الدنيا، فتذكّر أن باب السماء لا يُغلق.",
      "القلب الذي يذكر الله كثيرًا، تهون عليه هموم الحياة.",
      "أجمل الطمأنينة أن تعلم أن الله يدبّر أمرك كله.",
      "كلما انكسرتَ لله، جبرك الله بلطفٍ لا تتخيله.",
      "من وثق بالله، رأى الخير حتى في أصعب الطرق.",
      "الدعاء نورٌ خفيّ، لكنه يفتح أبوابًا لا يفتحها شيء آخر.",
      "لا تيأس، فالله قادر أن يبدّل حزنك سكينةً في لحظة.",
      "الرضا بالله يُورث القلب سلامًا لا تصنعه الدنيا.",
      "إذا تعثّرت خُطاك، فاعلم أن الله يهيّئ لك طريقًا أفضل.",
      "القرآن حياةٌ للروح، وشفاءٌ لما أثقل القلب.",
      "كل خيرٍ ترجوه، خزائنه عند الله.",
      "حين تظن أن كل شيء انتهى، يبدأ لطف الله.",
      "أكثر ما يطمئن القلب: أن الله يرى، ويسمع، ويعلم.",
      "الصبر ليس انتظارًا مؤلمًا فقط، بل عبادةٌ عظيمة يؤجر الله عليها.",
      "ما دام الله معك، فلا تخشَ من تقلبات الدنيا.",
      "استغفارٌ صادق قد يفتح لك أبواب رزقٍ وفرجٍ لا تتوقعها.",
      "جمّل يومك بالصلاة على النبي ﷺ.",
      "القرب من الله هو الأمان الحقيقي في هذا العالم المضطرب.",
      "الشغف بالعلم: يجب أن يكون الدافع الأساسي للتعلم هو الشغف بالمعرفة والرغبة في الاكتشاف لتعلم المستمر: لا يتوقف التعلم عند انتهاء الدراسة الرسمية؛ يجب أن يكون نمط حياة. استفد من الدورات التدريبية المجانية عبر الإنترنت، الكتب الإلكترونية، والمحاضرات المتاحة عبر الشبكة المنهجية العلمية: اعتمد على المنهج العلمي في البحث والتحليل، ولا تكتف بالمعلومات السطحية. جرّب واختبر نظرياتك وافتراضاتك.",
                    
                    "ثمة مشاعر كان يجب ألاَ تذهب لأحدهم، ثمة أحاديث ليتها ما قيلت، تضحيات ليتنا لم نقم بها، أعذارًا ليتنا لم نلتمسها، حقاً ثمة جواهر خرجت لِمن لا يستحق ",
                    "لا أحد من الخلق يستطيع أن يغضبك أو يحزنك دون إرادتك ، ما تشعر به في داخلك من مشاعر سلبية ليس بسبب ما يحدث حولك ، ولا برسالة منتقضة ، أو ازدراء عابر ، أو ظن سوء من بعيد ، أو جفاء من قريب ، كلا .. ما يحدث في داخلك هو بسبب تحليلك أنت للأمور من حولك ، وعندما تغير طريقة نظرك للأحداث ستتغير مشاعرك وتهدأ انفعالاتك حتى بالنسبة للحدث ذاته ",
                    "لن يفهمك أحد ، فأنت تتحدث عن أمرٍ قطعت فيه آلاف الأميال تفكيرًا ولم يمشي فيه خطوة واحدة ، لن يشعر بك أحد ، فأنت تشرح شعورًا جال في قلبك كل ليلة ملايين المرات ولم يطرق قلبه ليلة ، ليس ذنبه ، بل هي المسافة الهائلة بين التجربة والكلمات ",
                    " تدمير إنسان قد يستغرق دقيقة، والإعجاب بإنسان قد يستغرق ساعة، و محبة إنسان قد تسغرق أيام، و لكن نسيان إنسان قد يستغرق عمرًا بأكمله!",
                    "الحياة إبتلاء .. إذا أجاب الله دعائك فهو يزيد من إيمانك ، وإذا تأخر فى الإجابة فهو يزيد من صبرك ، وإذا لم يجبك فهو يحمل لك الأجمل ",
                    "فيحدث أن تصمت عمّا يخدش روحك، وتنهي الجدال بابتسامة أشبه بالغصّة، ليس ضعفًا منك ولا حتى طيبة؛ بل لمحاولة تجاوز الخلاف بأقل الأضرار الممكنة ",
                    "‏أعتقد أنه من الجيد أن تبقى صامتاً لفترة ، الكلمات لا تستطيع أن تعبر عن كل شيء ",
                    "غالبًا وبشكل طردي كلما زاد النضج عندك كل ما زاد تعلّقك بالأُمور الحقيقيّة وبُعدك البُعد التام عن أي شي وهمي أو حتى شبه وهمي ",
                    "برود العلاقة أقسى من إنتهائها، لأنك كنت تعتقد أن الحب أقوى من كل شيء، من البُعد ولياليكم الطويلة ومن هذه الكلمات الصغيرة جدًا، لكن برودها يهزمك ويُدخلك في تساؤلات لا نهاية لها، وتكتشف فعلًا أن الحب أقوى وأنت الضعيف أمامه.. وتظل تسأل ما ذنب هذا الحب يمضي كالسراب ",
                    "يجب عليك الإدراك بأن كل الأشياء قابلة للتغيير أولهم ذلك الذي تستثنيه دائماً 👌🏻💙 ",
                    "‏علَاقاتك بالمَاضي لا تُعطيك الحَق لِظلُم من يَعيش في حَاضرك ",
                    " دائمًا إتَّزن بين عقلك وقلبك، حافظ على كرامة قلبك من التهميش، وعقلك من الاستخفاف به، لا أحد يستحق كل اندفاعك",
                    "‏أسوأ ما يمكن أن يُحِسَّ به المرء، أن يشعر أنه رغم كل شيءٍ لم يكن كافياً ",
                    " لا تتعلق بـ شخص لا يكتب لك ، لا يتفقدك ، لا يبادر دائماً بالسؤال ، لا يزاحم يومك ، لا يقرأ ما بك ، لا يحفظ أهم تواريخك، لا يراقبك ليعرف تفاصيلك ، لا يشعر بك عندما تكذب انك بخير ، لا يملأ حياتك بالمفاجأت . باختصار لا تجعل شخصا اولوية بينما انت لست على رأس قائمة أولوياته",
                    "‏من الضروري جداً أن تدرب عقلك ان يكون اقوى من عواطفك ، والا ستخسر نفسك في كل مرة ",
                    "‏ستعيش مرحلة من حياتك تكون فيها أكثر هدوءًا، تتظاهر بعدم الفهم، تتخطى مسألة العتب رغم وجاهته، لن تتصيد الهفوات، تتصالح مع ذاتك، وتبتعد عن المقارنات والتقليد، وتكون لك ذائقة مستقلة، هذا هو النضج العقلي، ولا علاقة له بالعمر بل بالتجارب",
              "الألم ؛ هو أن تكتشف أنك كنت ترسم أحلامك لشخص أعمى، وتصف مشاعرك لشخص أصم، وتكتب معاناتك لشخص لا يجيد القراءة ",

    const quoteText = document.getElementById("quoteText");
    const randomBtn = document.getElementById("randomBtn");
    const copyBtn = document.getElementById("copyBtn");
    const statusText = document.getElementById("statusText");
    const shareGeneralBtn = document.getElementById("shareGeneralBtn");
    const searchInput = document.getElementById("searchInput");
    const searchHintText = document.getElementById("searchHintText");
    const modeInfoText = document.getElementById("modeInfoText");

    const whatsappShare = document.getElementById("whatsappShare");
    const telegramShare = document.getElementById("telegramShare");
    const facebookShare = document.getElementById("facebookShare");

    let currentQuote = "";
    let isAnimating = false;
    let cycleTimeout = null;
    let typeInterval = null;
    let eraseInterval = null;
    let soundEnabled = true;
    let filteredQuotes = [...quotes];
    let audioCtx = null;

    const TYPING_SPEED = 65;
    const ERASING_SPEED = 28;
    const READING_DELAY = 5200;

    function normalizeArabic(text) {
      return text
        .toLowerCase()
        .replace(/[أإآٱ]/g, "ا")
        .replace(/ى/g, "ي")
        .replace(/ؤ/g, "و")
        .replace(/ئ/g, "ي")
        .replace(/ة/g, "ه")
        .replace(/ً|ٌ|ٍ|َ|ُ|ِ|ّ|ْ|ـ/g, "")
        .trim();
    }

    function getPool() {
      return filteredQuotes.length ? filteredQuotes : [];
    }

    function getRandomQuoteFromPool() {
      const pool = getPool();
      if (!pool.length) return null;
      if (pool.length === 1) return pool[0];

      let newQuote;
      let guard = 0;
      do {
        newQuote = pool[Math.floor(Math.random() * pool.length)];
        guard++;
      } while (newQuote === currentQuote && guard < 20);

      return newQuote;
    }

    function updateShareLinks(text) {
      const pageUrl = window.location.href;
      const shareText = text + " 🌿";

      whatsappShare.href = `https://wa.me/?text=${encodeURIComponent(shareText + "\n" + pageUrl)}`;
      telegramShare.href = `https://t.me/share/url?url=${encodeURIComponent(pageUrl)}&text=${encodeURIComponent(shareText)}`;
      facebookShare.href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(pageUrl)}`;
    }

    function setTypingText(text) {
      quoteText.innerHTML = `${text}<span class="cursor"></span>`;
    }

    function setPlainText(text, isEmpty = false) {
      if (isEmpty) {
        quoteText.innerHTML = `<span class="empty-state">${text}</span>`;
      } else {
        quoteText.textContent = text;
      }
    }

    function clearAllTimers() {
      clearTimeout(cycleTimeout);
      clearInterval(typeInterval);
      clearInterval(eraseInterval);
    }

    function ensureAudio() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) audioCtx = new AudioContextClass();
      }
    }

    function playTypeSound() {
  if (!soundEnabled) return;

  ensureAudio();
  if (!audioCtx) return;

  if (audioCtx.state === "suspended") {
    audioCtx.resume().catch(() => {});
  }

  const now = audioCtx.currentTime;

  // مولد ضجيج قصير لإعطاء إحساس "تكّة" ميكانيكية
  const bufferSize = 0.02 * audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  const bandpass = audioCtx.createBiquadFilter();
  bandpass.type = "bandpass";
  bandpass.frequency.value = 2200 + Math.random() * 700;
  bandpass.Q.value = 1.2;

  const highpass = audioCtx.createBiquadFilter();
  highpass.type = "highpass";
  highpass.frequency.value = 1200;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.03 + Math.random() * 0.01, now + 0.002);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.028);

  // ضربة معدنية خفيفة جدًا فوق الضجيج
  const osc = audioCtx.createOscillator();
  const oscGain = audioCtx.createGain();

  osc.type = "triangle";
  osc.frequency.setValueAtTime(1400 + Math.random() * 300, now);
  osc.frequency.exponentialRampToValueAtTime(700 + Math.random() * 120, now + 0.02);

  oscGain.gain.setValueAtTime(0.0001, now);
  oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.001);
  oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.02);

  noise.connect(bandpass);
  bandpass.connect(highpass);
  highpass.connect(gain);
  gain.connect(audioCtx.destination);

  osc.connect(oscGain);
  oscGain.connect(audioCtx.destination);

  noise.start(now);
  noise.stop(now + 0.03);

  osc.start(now);
  osc.stop(now + 0.022);
}

    function typeQuote(text, onDone) {
  let i = 0;
  setTypingText("");

  typeInterval = setInterval(() => {
    i++;

    const visibleText = text.slice(0, i);
    setTypingText(visibleText);

    const lastChar = visibleText[visibleText.length - 1];
    if (lastChar && lastChar.trim() !== "") {
      playTypeSound();
    }

    if (i >= text.length) {
      clearInterval(typeInterval);
      if (typeof onDone === "function") onDone();
    }
  }, 95);
}

    function eraseQuote(onDone) {
      let text = currentQuote;
      let i = text.length;

      eraseInterval = setInterval(() => {
        i--;
        setTypingText(text.slice(0, Math.max(i, 0)));

        if (i <= 0) {
          clearInterval(eraseInterval);
          if (typeof onDone === "function") onDone();
        }
      }, ERASING_SPEED);
    }

    function updateModeTexts() {
      const keyword = searchInput.value.trim();

      if (!keyword) {
        searchHintText.textContent = `يتم الآن العرض من جميع العبارات (${quotes.length})`;
        modeInfoText.textContent = "    ";
        return;
      }

      if (filteredQuotes.length) {
        searchHintText.textContent = `تم العثور على ${filteredQuotes.length} عبارة مطابقة لكلمة: ${keyword}`;
        modeInfoText.textContent = "يتم التبديل عشوائيًا فقط بين نتائج البحث المطابقة";
      } else {
        searchHintText.textContent = `لا توجد عبارات تحتوي على: ${keyword}`;
        modeInfoText.textContent = "عدّل كلمة البحث أو امسحها للعودة إلى جميع العبارات";
      }
    }

    function applySearchFilter() {
      const keyword = normalizeArabic(searchInput.value);

      if (!keyword) {
        filteredQuotes = [...quotes];
      } else {
        filteredQuotes = quotes.filter(q =>
          normalizeArabic(q).includes(keyword)
        );
      }

      updateModeTexts();
      restartCycle(true);
    }

    function startQuoteCycle(forceManual = false) {
      if (isAnimating && !forceManual) return;

      clearAllTimers();
      isAnimating = true;

      const nextQuote = getRandomQuoteFromPool();

      if (!nextQuote) {
        currentQuote = "";
        setPlainText("لم يتم العثور على عبارات مطابقة لهذه الكلمة", true);
        statusText.textContent = "لا توجد نتائج حاليًا";
        isAnimating = false;
        return;
      }

      currentQuote = nextQuote;
      updateShareLinks(currentQuote);

      typeQuote(currentQuote, () => {
        statusText.textContent = "يمكنك الآن قراءة العبارة بهدوء ✨";

        cycleTimeout = setTimeout(() => {
          eraseQuote(() => {
            isAnimating = false;
            startQuoteCycle();
          });
        }, READING_DELAY);
      });
    }

    function restartCycle(forceManual = false) {
      clearAllTimers();
      isAnimating = false;
      startQuoteCycle(forceManual);
    }

    async function copyCurrentQuote() {
      if (!currentQuote) {
        statusText.textContent = "لا توجد عبارة قابلة للنسخ";
        return;
      }

      try {
        await navigator.clipboard.writeText(currentQuote);
        statusText.textContent = "تم نسخ العبارة بنجاح ✅";
      } catch (e) {
        statusText.textContent = "تعذر النسخ في هذا المتصفح";
      }

      setTimeout(() => {
        statusText.textContent = "تظهر العبارة تدريجيًا لتسهيل القراءة";
      }, 2200);
    }

    async function shareGeneral() {
      if (!currentQuote) {
        statusText.textContent = "لا توجد عبارة قابلة للمشاركة";
        return;
      }

      const pageUrl = window.location.href;

      if (navigator.share) {
        try {
          await navigator.share({
            title: "عبارات إسلامية عشوائية | KeFo.tech",
            text: currentQuote,
            url: pageUrl
          });
          statusText.textContent = "تم فتح نافذة المشاركة ✅";
        } catch (e) {
          statusText.textContent = "تم إلغاء المشاركة";
        }
      } else {
        await copyCurrentQuote();
        statusText.textContent = "تم نسخ العبارة، شاركها يدويًا مع الرابط ✅";
      }

      setTimeout(() => {
        statusText.textContent = "تظهر العبارة تدريجيًا لتسهيل القراءة";
      }, 2200);
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundToggleBtn.classList.toggle("active", soundEnabled);
      soundToggleBtn.textContent = soundEnabled ? "🔊 صوت الكتابة" : "🔇 الصوت متوقف";
      statusText.textContent = soundEnabled ? "تم تشغيل صوت الكتابة" : "تم إيقاف صوت الكتابة";
    }

    randomBtn.addEventListener("click", () => {
      restartCycle(true);
    });

    copyBtn.addEventListener("click", copyCurrentQuote);
    shareGeneralBtn.addEventListener("click", shareGeneral);

    searchInput.addEventListener("input", applySearchFilter);

    

    document.addEventListener("click", () => {
      ensureAudio();
      if (audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume().catch(() => {});
      }
    }, { once: true });

    document.addEventListener("contextmenu", (e) => e.preventDefault(), { passive: false });
    document.addEventListener("dragstart", (e) => e.preventDefault());
    document.addEventListener("selectstart", (e) => e.preventDefault());

    updateModeTexts();
    startQuoteCycle();
  </script>
