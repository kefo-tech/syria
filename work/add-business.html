<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أضف عملك</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-shell">

    <header class="detail-header">
      <div class="detail-header-inner">
        <a href="index.html" class="back-link">← العودة للرئيسية</a>
      </div>
    </header>

    <main class="content">
      <section class="placeholder-page">
        <div class="placeholder-card">
          <h1>صفحة إضافة متجر جديد</h1>
          <p>
            هذه الصفحة جاهزة مبدئيًا، وسنقوم لاحقًا بتصميم نموذج إضافة النشاط
            وربطه بنظام المراجعة والموافقة قبل النشر.
          </p>
          <a href="index.html" class="primary-link-btn">العودة للرئيسية</a>
        </div>
      </section>
    </main>

    <a href="add-business.html" class="floating-add-btn">＋ أضف عملك</a>

    <footer class="site-footer">
      <div class="footer-inner">
        © KeFo.tech — جميع الحقوق محفوظة
      </div>
    </footer>

  </div>

  <script>
    // حماية من النسخ وزر اليمين
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("copy", e => e.preventDefault());
    document.addEventListener("cut", e => e.preventDefault());
    document.addEventListener("selectstart", e => e.preventDefault());
    document.addEventListener("dragstart", e => e.preventDefault());

    let touchTimer;
    document.addEventListener("touchstart", () => {
      touchTimer = setTimeout(() => {}, 500);
    }, { passive: true });
    document.addEventListener("touchend", () => clearTimeout(touchTimer), { passive: true });
  </script>
</body>
</html>
