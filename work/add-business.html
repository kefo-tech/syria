<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أضف عملك</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-shell">

    <header class="fixed-top-wrap detail-top-wrap">
      <div class="top-search-shell detail-shell">
        <a href="index.html" class="back-link-btn">← العودة للرئيسية</a>
      </div>
    </header>

    <main class="container page-content detail-page has-fixed-top">
      <section class="glass-card add-placeholder-card">
        <h1 class="store-detail-title">صفحة إضافة متجر جديد</h1>
        <p class="store-detail-description">
          هذه الصفحة جاهزة مؤقتًا، وسنقوم لاحقًا ببناء نموذج إضافة النشاط التجاري
          وربطه بنظام المراجعة والموافقة قبل النشر.
        </p>

        <a href="index.html" class="primary-action-link">العودة للرئيسية</a>
      </section>
    </main>

    <div class="fixed-bottom-wrap">
      <div class="bottom-main-actions">
        <a href="add-business.html" class="big-add-business-btn">＋ أضف عملك</a>
      </div>

      <div class="fixed-copyright">
        © KeFo.tech — جميع الحقوق محفوظة
      </div>
    </div>

  </div>

  <script>
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("copy", e => e.preventDefault());
    document.addEventListener("cut", e => e.preventDefault());
    document.addEventListener("selectstart", e => e.preventDefault());
    document.addEventListener("dragstart", e => e.preventDefault());

    document.addEventListener("keydown", e => {
      const key = e.key.toLowerCase();
      if (
        (e.ctrlKey && ["u", "c", "x", "s", "a"].includes(key)) ||
        e.key === "F12"
      ) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
