<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منصة الأعمال المحلية</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-shell">

    <header class="fixed-top-wrap">
      <div class="top-search-shell">
        <div class="welcome-strip" id="welcomeText">أهلاً بك في: جارٍ تحديد موقعك...</div>

        <div class="search-bar-wrap">
          <input
            id="searchInput"
            class="main-search-input"
            type="text"
            placeholder="ابحث باسم المتجر أو نوع الخدمة أو المنطقة..."
            autocomplete="off"
          />
        </div>

        <div class="top-status-row">
          <span id="locationStatus">جارٍ تحديد الموقع...</span>
          <span id="resultsCount">0 نتيجة</span>
        </div>
      </div>
    </header>

    <main class="container page-content has-fixed-top">
      <section class="section-title-wrap">
        <h1 class="services-title">الأعمال القريبة منك</h1>
        <p class="section-subtitle">النتائج تظهر تلقائيًا ضمن نطاق 3 كم من موقعك الحالي</p>
      </section>

      <section id="storesGrid" class="stores-grid"></section>

      <section id="emptyState" class="empty-state hidden">
        <div class="glass-card empty-card">
          <h3>لا توجد نتائج حالياً</h3>
          <p>جرّب البحث باسم آخر أو تأكد من تفعيل الموقع الجغرافي.</p>
        </div>
      </section>
    </main>

    <div class="fixed-bottom-wrap">
      <div class="bottom-main-actions">
        <a href="add-business.html" class="big-add-business-btn">＋ أضف عملك</a>
      </div>

      <div class="fixed-copyright">
        © KeFo.tech — جميع الحقوق محفوظة
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
