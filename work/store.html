<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل المتجر</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-shell">

    <header class="fixed-top-wrap detail-top-wrap">
      <div class="top-search-shell detail-shell">
        <a href="index.html" class="back-link-btn">← العودة للرئيسية</a>
      </div>
    </header>

    <main class="container page-content detail-page has-fixed-top">
      <section id="storeDetail"></section>
    </main>

    <div class="fixed-bottom-wrap">
      <div class="bottom-main-actions">
        <a href="add-business.html" class="big-add-business-btn">＋ أضف عملك</a>
      </div>

      <div class="fixed-copyright">
        © KeFo.tech — جميع الحقوق محفوظة
      </div>
    </div>

  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("copy", e => e.preventDefault());
    document.addEventListener("cut", e => e.preventDefault());
    document.addEventListener("selectstart", e => e.preventDefault());
    document.addEventListener("dragstart", e => e.preventDefault());

    document.addEventListener("keydown", e => {
      const key = e.key.toLowerCase();
      if (
        (e.ctrlKey && ["u", "c", "x", "s", "a"].includes(key)) ||
        e.key === "F12"
      ) {
        e.preventDefault();
      }
    });

    const params = new URLSearchParams(window.location.search);
    const storeId = params.get("id");
    const detailContainer = document.getElementById("storeDetail");
    const store = STORES.find(item => item.id === storeId);

    function safeLink(value) {
      return value ? value : "#";
    }

    if (!store) {
      detailContainer.innerHTML = `
        <div class="glass-card empty-card">
          <h2>المتجر غير موجود</h2>
          <p>الرابط غير صحيح أو أن المتجر لم يعد متاحًا.</p>
          <a href="index.html" class="primary-action-link">العودة للرئيسية</a>
        </div>
      `;
    } else {
      const mapsUrl = store.mapsLink || \`https://www.google.com/maps?q=\${store.lat},\${store.lng}\`;

      detailContainer.innerHTML = `
        <article class="store-detail-card glass-card">
          <div class="store-detail-cover-wrap">
            <img src="${store.cover}" alt="${store.name}" class="store-detail-cover" />
            <span class="store-detail-type">${store.type}</span>
          </div>

          <div class="store-detail-body">
            <h1 class="store-detail-title">${store.name}</h1>
            <p class="store-detail-location">${store.city} - ${store.area}</p>
            <p class="store-detail-description">${store.description}</p>

            <div class="detail-info-grid">
              <div class="detail-info-box">
                <strong>العنوان</strong>
                <span>${store.address || "غير محدد"}</span>
              </div>

              <div class="detail-info-box">
                <strong>الهاتف</strong>
                <span>${store.phone || "غير متوفر"}</span>
              </div>

              <div class="detail-info-box">
                <strong>أوقات العمل</strong>
                <span>${store.hours || "غير محدد"}</span>
              </div>

              <div class="detail-info-box">
                <strong>نوع الخدمة</strong>
                <span>${store.type || "غير محدد"}</span>
              </div>
            </div>

            <div class="detail-actions">
              ${store.phone ? `<a class="detail-action-btn" href="tel:${store.phone}">اتصال</a>` : ""}
              ${store.whatsapp ? `<a class="detail-action-btn whatsapp-btn" target="_blank" href="https://wa.me/${store.whatsapp}">واتساب</a>` : ""}
              ${store.facebook ? `<a class="detail-action-btn" target="_blank" href="${safeLink(store.facebook)}">فيسبوك</a>` : ""}
              ${store.instagram ? `<a class="detail-action-btn" target="_blank" href="${safeLink(store.instagram)}">إنستغرام</a>` : ""}
              <a class="detail-action-btn maps-btn" target="_blank" href="${mapsUrl}">خرائط جوجل</a>
            </div>
          </div>
        </article>
      `;
    }
  </script>
</body>
</html>
